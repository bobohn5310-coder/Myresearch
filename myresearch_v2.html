<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyResearch Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f6fa;
    --white: #ffffff;
    --surface: #ffffff;
    --surface2: #f0f2f8;
    --border: #e4e8f0;
    --border-light: #eef1f8;

    --blue: #3b6ef8;
    --blue-light: #eef2ff;
    --blue-mid: #c7d5fd;
    --green: #0ea874;
    --green-light: #e6f9f2;
    --amber: #f59e0b;
    --amber-light: #fef3cd;
    --red: #ef4444;
    --red-light: #fef2f2;
    --purple: #7c3aed;
    --purple-light: #f3eeff;

    --text: #1a1f36;
    --text-sub: #4a5072;
    --text-muted: #9099b8;
    --text-light: #b8bdd6;

    --shadow-sm: 0 1px 3px rgba(30,40,100,0.06), 0 1px 2px rgba(30,40,100,0.04);
    --shadow: 0 4px 16px rgba(30,40,100,0.08), 0 1px 4px rgba(30,40,100,0.04);
    --shadow-lg: 0 12px 40px rgba(30,40,100,0.12), 0 4px 12px rgba(30,40,100,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    position: fixed;
    left: 0; top: 0;
    width: 240px;
    height: 100vh;
    background: var(--white);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 100;
    box-shadow: var(--shadow-sm);
  }

  .logo {
    padding: 28px 24px 24px;
    border-bottom: 1px solid var(--border-light);
  }

  .logo-mark {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: var(--blue);
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    box-shadow: 0 2px 8px rgba(59,110,248,0.35);
  }

  .logo-title {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.3px;
    padding-left: 42px;
  }

  .nav { padding: 20px 16px; flex: 1; }

  .nav-section-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 0 10px;
    margin-bottom: 6px;
    margin-top: 16px;
  }

  .nav-section-label:first-child { margin-top: 0; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 9px;
    cursor: pointer;
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text-sub);
    transition: all 0.15s;
    margin-bottom: 1px;
  }

  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--blue-light); color: var(--blue); }

  .nav-icon {
    width: 28px; height: 28px;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    background: var(--surface2);
    flex-shrink: 0;
  }

  .nav-item.active .nav-icon { background: var(--blue-mid); }

  .sidebar-bottom {
    padding: 16px;
    border-top: 1px solid var(--border-light);
  }

  .hashtag-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .hashtags { display: flex; flex-wrap: wrap; gap: 6px; }

  .hashtag {
    font-size: 11.5px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--blue-light);
    color: var(--blue);
    border: 1px solid var(--blue-mid);
    cursor: pointer;
    transition: all 0.15s;
  }

  .hashtag:hover { background: var(--blue); color: white; }
  .hashtag.add { background: var(--surface2); color: var(--text-muted); border-color: var(--border); }
  .hashtag.add:hover { background: var(--border); color: var(--text); }

  /* ── MAIN ── */
  .main { margin-left: 240px; min-height: 100vh; }

  .topbar {
    height: 64px;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: var(--shadow-sm);
  }

  .topbar-left { display: flex; flex-direction: column; }

  .topbar-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
  }

  .topbar-date {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    margin-top: 1px;
  }

  .topbar-right { display: flex; align-items: center; gap: 12px; }

  .search-wrap {
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    color: var(--text-muted);
    pointer-events: none;
  }

  .search-input {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px 8px 34px;
    font-size: 13px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    width: 220px;
    transition: all 0.2s;
  }

  .search-input:focus { outline: none; border-color: var(--blue); background: white; box-shadow: 0 0 0 3px rgba(59,110,248,0.1); }
  .search-input::placeholder { color: var(--text-muted); }

  .btn-primary {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--blue);
    color: white;
    border: none;
    padding: 9px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(59,110,248,0.3);
  }

  .btn-primary:hover { background: #2d5ef0; box-shadow: 0 4px 16px rgba(59,110,248,0.4); transform: translateY(-1px); }

  /* ── PAGES ── */
  .page { display: none; }
  .page.active { display: block; animation: fadeUp 0.25s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .content { padding: 28px 32px; }

  /* ── STATS ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 22px 22px 18px;
    box-shadow: var(--shadow-sm);
    transition: all 0.2s;
    cursor: default;
  }

  .stat-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }

  .stat-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .stat-icon {
    width: 38px; height: 38px;
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .stat-trend {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
  }

  .stat-card.blue .stat-icon { background: var(--blue-light); }
  .stat-card.green .stat-icon { background: var(--green-light); }
  .stat-card.amber .stat-icon { background: var(--amber-light); }
  .stat-card.red .stat-icon { background: var(--red-light); }

  .stat-card.blue .stat-trend { background: var(--blue-light); color: var(--blue); }
  .stat-card.green .stat-trend { background: var(--green-light); color: var(--green); }
  .stat-card.amber .stat-trend { background: var(--amber-light); color: var(--amber); }
  .stat-card.red .stat-trend { background: var(--red-light); color: var(--red); }

  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 32px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-card.blue .stat-value { color: var(--blue); }
  .stat-card.green .stat-value { color: var(--green); }
  .stat-card.amber .stat-value { color: var(--amber); }
  .stat-card.red .stat-value { color: var(--red); }

  .stat-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-sub);
  }

  /* ── PANEL GRID ── */
  .panel-grid {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 20px;
  }

  .panel {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .panel-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border-light);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .panel-sub {
    font-size: 11.5px;
    color: var(--text-muted);
    font-weight: 400;
    margin-left: 6px;
  }

  .filter-row {
    display: flex;
    gap: 6px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border-light);
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 5px 13px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text-sub);
    transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .filter-btn:hover { border-color: var(--blue); color: var(--blue); }
  .filter-btn.active { background: var(--blue); border-color: var(--blue); color: white; }
  .filter-btn.active.green { background: var(--green); border-color: var(--green); }
  .filter-btn.active.amber { background: var(--amber); border-color: var(--amber); }

  /* ── INFO LIST ── */
  .info-list { max-height: 460px; overflow-y: auto; }
  .info-list::-webkit-scrollbar { width: 4px; }
  .info-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .info-item {
    display: flex;
    gap: 14px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border-light);
    cursor: pointer;
    transition: background 0.12s;
    align-items: flex-start;
  }

  .info-item:hover { background: #fafbff; }
  .info-item:last-child { border-bottom: none; }

  .info-badge {
    flex-shrink: 0;
    padding: 3px 9px;
    border-radius: 6px;
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.3px;
    margin-top: 1px;
  }

  .badge-conf { background: var(--blue-light); color: var(--blue); }
  .badge-scholar { background: var(--green-light); color: var(--green); }
  .badge-project { background: var(--amber-light); color: #b45309; }
  .badge-personal { background: var(--purple-light); color: var(--purple); }

  .info-body { flex: 1; min-width: 0; }

  .info-title {
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .info-meta {
    font-size: 11.5px;
    color: var(--text-muted);
    display: flex;
    gap: 10px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }

  .dday-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 5px;
    font-family: 'DM Mono', monospace;
  }

  .dday-urgent { background: var(--red-light); color: var(--red); }
  .dday-soon { background: var(--amber-light); color: #b45309; }
  .dday-ok { background: var(--green-light); color: var(--green); }

  .info-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .info-tag {
    font-size: 10.5px;
    font-weight: 500;
    padding: 2px 7px;
    background: var(--surface2);
    color: var(--text-muted);
    border-radius: 4px;
  }

  /* ── CALENDAR ── */
  .cal-top {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border-light);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .cal-month-label {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .cal-nav-btns { display: flex; gap: 4px; }

  .cal-btn {
    width: 28px; height: 28px;
    border-radius: 7px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text-sub);
    cursor: pointer;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }

  .cal-btn:hover { background: var(--blue); border-color: var(--blue); color: white; }

  .cal-grid-wrap { padding: 16px; }

  .cal-dow {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .cal-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }

  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    position: relative;
    transition: all 0.12s;
    color: var(--text-sub);
  }

  .cal-day:hover { background: var(--surface2); }
  .cal-day.today { background: var(--blue); color: white; font-weight: 700; box-shadow: 0 2px 8px rgba(59,110,248,0.4); }
  .cal-day.other-month { color: var(--text-light); }
  .cal-day.has-event::after {
    content: '';
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--blue);
    position: absolute;
    bottom: 3px;
  }
  .cal-day.today.has-event::after { background: white; }
  .cal-day.deadline::after { background: var(--red); }

  .upcoming-wrap { padding: 0 16px 16px; }

  .upcoming-header {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-top: 4px;
  }

  .event-row {
    display: flex;
    gap: 12px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border-light);
    align-items: flex-start;
  }

  .event-row:last-child { border-bottom: none; }

  .event-line {
    width: 3px;
    height: 100%;
    min-height: 32px;
    border-radius: 2px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .event-info { flex: 1; }
  .event-name { font-size: 12.5px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .event-date { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(20,30,80,0.4);
    backdrop-filter: blur(6px);
    z-index: 300;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--white);
    border-radius: 20px;
    padding: 32px;
    width: 480px;
    max-width: 92vw;
    box-shadow: var(--shadow-lg);
    animation: modalPop 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes modalPop {
    from { transform: scale(0.95) translateY(10px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .modal-sub { font-size: 12.5px; color: var(--text-muted); margin-bottom: 24px; }

  .form-group { margin-bottom: 18px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 13.5px;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
  }

  .form-input:focus { outline: none; border-color: var(--blue); background: white; box-shadow: 0 0 0 3px rgba(59,110,248,0.1); }
  select.form-input { cursor: pointer; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border-light); }

  .btn-ghost {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-sub);
    padding: 9px 20px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13.5px;
    font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
  }

  .btn-ghost:hover { border-color: var(--text-sub); color: var(--text); }

  .empty-state { text-align: center; padding: 48px 24px; }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .empty-text { font-size: 13.5px; color: var(--text-muted); }
  .empty-hint { font-size: 12px; color: var(--text-light); margin-top: 6px; }

  /* ── TABS ── */
  .tab-bar {
    display: flex;
    gap: 0;
    padding: 0 32px;
    background: var(--white);
    border-bottom: 1px solid var(--border);
  }

  .tab {
    padding: 14px 18px;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text-muted);
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }

  /* ── USER EVENTS ── */
  .user-event-item {
    display: flex;
    gap: 14px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border-light);
    align-items: center;
  }

  .user-event-item:last-child { border-bottom: none; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="logo" style="cursor:pointer;" onclick="window.location.href='index.html'">
    <div class="logo-mark">
      <div class="logo-icon">📅</div>
      <span class="logo-title">My Research Calendar</span>
    </div>
    <div class="logo-sub">← 홈으로 돌아가기</div>
  </div>

  <div class="nav">
    <div class="nav-section-label">메뉴</div>
    <div class="nav-item active" onclick="showPage('dashboard', this)">
      <div class="nav-icon">📊</div> 대시보드
    </div>
    <div class="nav-item" onclick="showPage('info', this)">
      <div class="nav-icon">🔍</div> 학술정보
    </div>
    <div class="nav-item" onclick="showPage('calendar', this)">
      <div class="nav-icon">📅</div> 캘린더
    </div>
  </div>

  <div class="sidebar-bottom">
    <div class="hashtag-label">내 해시태그</div>
    <div class="hashtags">
      <span class="hashtag">#반도체</span>
      <span class="hashtag">#플라즈마</span>
      <span class="hashtag">#머신러닝</span>
      <span class="hashtag">#양자점</span>
      <span class="hashtag add">＋ 추가</span>
    </div>
  </div>
</nav>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title" id="page-title">대시보드</div>
      <div class="topbar-date" id="today-date"></div>
    </div>
    <div class="topbar-right">
      <div class="search-wrap">
        <span class="search-icon">🔎</span>
        <input class="search-input" placeholder="학회, 장학금 검색...">
      </div>
      <button class="btn-primary" onclick="openModal()">＋ 일정 추가</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="page active" id="page-dashboard">
    <div class="content">
      <div class="stats-row">
        <div class="stat-card blue">
          <div class="stat-top">
            <div class="stat-icon">🎓</div>
            <span class="stat-trend">+3 신규</span>
          </div>
          <div class="stat-value">24</div>
          <div class="stat-label">등록된 학회</div>
        </div>
        <div class="stat-card green">
          <div class="stat-top">
            <div class="stat-icon">💰</div>
            <span class="stat-trend">+2 신규</span>
          </div>
          <div class="stat-value">11</div>
          <div class="stat-label">장학금 공모</div>
        </div>
        <div class="stat-card amber">
          <div class="stat-top">
            <div class="stat-icon">📋</div>
            <span class="stat-trend">매칭 3건</span>
          </div>
          <div class="stat-value">08</div>
          <div class="stat-label">국가과제</div>
        </div>
        <div class="stat-card red">
          <div class="stat-top">
            <div class="stat-icon">⚠️</div>
            <span class="stat-trend">즉시 확인</span>
          </div>
          <div class="stat-value">03</div>
          <div class="stat-label">D-7 마감 임박</div>
        </div>
      </div>

      <div class="panel-grid">
        <div class="panel">
          <div class="panel-header">
            <div>
              <span class="panel-title">추천 학술정보</span>
              <span class="panel-sub">— #반도체 #머신러닝 기반</span>
            </div>
          </div>
          <div class="filter-row">
            <button class="filter-btn active" onclick="filterDash(this,'all')">전체</button>
            <button class="filter-btn" onclick="filterDash(this,'conf')">학회</button>
            <button class="filter-btn" onclick="filterDash(this,'scholar')">장학금</button>
            <button class="filter-btn" onclick="filterDash(this,'project')">국가과제</button>
          </div>
          <div class="info-list" id="list-dash"></div>
        </div>

        <div class="panel" style="display:flex;flex-direction:column;">
          <div class="cal-top">
            <div class="cal-month-label" id="cal-label-1"></div>
            <div class="cal-nav-btns">
              <button class="cal-btn" onclick="prevMonth()">‹</button>
              <button class="cal-btn" onclick="nextMonth()">›</button>
            </div>
          </div>
          <div class="cal-grid-wrap">
            <div class="cal-dow"><div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div></div>
            <div class="cal-days" id="cal-1"></div>
          </div>
          <div class="upcoming-wrap">
            <div class="upcoming-header">다가오는 마감</div>
            <div id="upcoming"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- INFO -->
  <div class="page" id="page-info">
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab(this,'all')">전체</div>
      <div class="tab" onclick="switchTab(this,'conf')">학회</div>
      <div class="tab" onclick="switchTab(this,'scholar')">장학금</div>
      <div class="tab" onclick="switchTab(this,'project')">국가과제</div>
    </div>
    <div class="content">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">전체 학술정보</span>
          <span style="font-size:12px;color:var(--text-muted);">총 8건</span>
        </div>
        <div class="info-list" id="list-all"></div>
      </div>
    </div>
  </div>

  <!-- CALENDAR -->
  <div class="page" id="page-calendar">
    <div class="content">
      <div class="panel-grid">
        <div class="panel" style="display:flex;flex-direction:column;">
          <div class="cal-top">
            <div class="cal-month-label" id="cal-label-2"></div>
            <div style="display:flex;gap:8px;align-items:center;">
              <div class="cal-nav-btns">
                <button class="cal-btn" onclick="prevMonth()">‹</button>
                <button class="cal-btn" onclick="nextMonth()">›</button>
              </div>
              <button class="btn-primary" style="padding:6px 14px;font-size:12px;" onclick="openModal()">＋ 추가</button>
            </div>
          </div>
          <div class="cal-grid-wrap">
            <div class="cal-dow"><div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div></div>
            <div class="cal-days" id="cal-2"></div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">등록된 일정</span>
          </div>
          <div class="info-list" id="list-user"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">새 일정 추가</div>
    <div class="modal-sub">학회, 장학금, 과제 마감일 등을 등록하세요</div>
    <div class="form-group">
      <label class="form-label">일정 제목</label>
      <input type="text" class="form-input" id="f-title" placeholder="예: IEEE IEDM 2025 논문 제출">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">카테고리</label>
        <select class="form-input" id="f-type">
          <option value="conf">학회</option>
          <option value="scholar">장학금</option>
          <option value="project">국가과제</option>
          <option value="personal">개인 일정</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">마감일</label>
        <input type="date" class="form-input" id="f-date">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">메모 (선택)</label>
      <input type="text" class="form-input" id="f-memo" placeholder="간단한 메모를 입력하세요">
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn-primary" onclick="saveEvent()">저장하기</button>
    </div>
  </div>
</div>

<script>
const DATA = [
  { id:1, type:'conf',    title:'IEEE IEDM 2025',               org:'IEEE',       deadline:'2025-04-15', tags:['반도체','소자'],      dday:45 },
  { id:2, type:'scholar', title:'한국연구재단 박사과정생 연구장려금',    org:'NRF',        deadline:'2025-04-01', tags:['이공계','박사'],      dday:31 },
  { id:3, type:'project', title:'차세대 반도체 소자 원천기술 개발',    org:'산업통상자원부', deadline:'2025-05-20', tags:['반도체','국가R&D'],   dday:80 },
  { id:4, type:'conf',    title:'한국반도체학술대회 KSIA 2025',     org:'KSIA',       deadline:'2025-03-28', tags:['반도체','플라즈마'],   dday:7  },
  { id:5, type:'scholar', title:'삼성 이건희 과학기술 장학금',        org:'삼성재단',     deadline:'2025-04-30', tags:['이공계'],            dday:60 },
  { id:6, type:'conf',    title:'AVS 국제 학술대회',               org:'AVS',        deadline:'2025-06-10', tags:['플라즈마','박막'],    dday:100},
  { id:7, type:'project', title:'AI 반도체 공정 최적화 연구',        org:'과학기술정보부', deadline:'2025-04-20', tags:['AI','반도체'],       dday:50 },
  { id:8, type:'scholar', title:'포스코 청암재단 장학금',             org:'포스코',      deadline:'2025-05-01', tags:['이공계','박사'],      dday:61 },
];

let userEvents = [];
let cy = new Date().getFullYear();
let cm = new Date().getMonth();

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const COLORS = { conf:'#3b6ef8', scholar:'#0ea874', project:'#f59e0b', personal:'#7c3aed' };

function ddayClass(d) {
  if (d <= 7) return 'dday-urgent';
  if (d <= 30) return 'dday-soon';
  return 'dday-ok';
}

function getBadge(type) {
  const map = { conf:'학회', scholar:'장학금', project:'국가과제', personal:'개인' };
  return `<span class="info-badge badge-${type}">${map[type]||type}</span>`;
}

function renderList(id, filter='all') {
  const el = document.getElementById(id);
  const items = filter==='all' ? DATA : DATA.filter(d=>d.type===filter);
  if (!items.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">해당하는 정보가 없습니다</div></div>`;
    return;
  }
  el.innerHTML = items.map(item => `
    <div class="info-item">
      ${getBadge(item.type)}
      <div class="info-body">
        <div class="info-title">${item.title}</div>
        <div class="info-meta"><span>${item.org}</span><span>${item.deadline}</span></div>
        <span class="dday-badge ${ddayClass(item.dday)}">D-${item.dday}</span>
        <div class="info-tags">${item.tags.map(t=>`<span class="info-tag">#${t}</span>`).join('')}</div>
      </div>
    </div>
  `).join('');
}

function filterDash(btn, type) {
  document.querySelectorAll('.filter-row .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList('list-dash', type);
}

function renderCal() {
  const label = `${cy} / ${MONTHS[cm]}`;
  ['cal-label-1','cal-label-2'].forEach(id=>{ const e=document.getElementById(id); if(e) e.textContent=label; });

  const today = new Date();
  const first = new Date(cy,cm,1).getDay();
  const total = new Date(cy,cm+1,0).getDate();
  const deadlineDays = DATA.map(d=>{ const dt=new Date(d.deadline); return dt.getFullYear()===cy&&dt.getMonth()===cm?dt.getDate():null; }).filter(Boolean);
  const userDays = userEvents.map(e=>{ const dt=new Date(e.date); return dt.getFullYear()===cy&&dt.getMonth()===cm?dt.getDate():null; }).filter(Boolean);

  ['cal-1','cal-2'].forEach(id=>{
    const el=document.getElementById(id); if(!el) return;
    let h='';
    for(let i=0;i<first;i++) h+=`<div class="cal-day other-month"></div>`;
    for(let d=1;d<=total;d++){
      const isToday=today.getDate()===d&&today.getMonth()===cm&&today.getFullYear()===cy;
      const isDeadline=deadlineDays.includes(d)||userDays.includes(d);
      h+=`<div class="cal-day ${isToday?'today':''} ${isDeadline?'has-event deadline':''}">${d}</div>`;
    }
    el.innerHTML=h;
  });

  // upcoming
  const up=document.getElementById('upcoming');
  if(up){
    const sorted=[...DATA].sort((a,b)=>a.dday-b.dday).slice(0,4);
    up.innerHTML=sorted.map(item=>`
      <div class="event-row">
        <div class="event-line" style="background:${COLORS[item.type]}"></div>
        <div class="event-info">
          <div class="event-name">${item.title}</div>
          <div class="event-date">${item.deadline} · D-${item.dday}</div>
        </div>
      </div>
    `).join('');
  }

  // user events
  const ul=document.getElementById('list-user');
  if(ul){
    if(!userEvents.length){
      ul.innerHTML=`<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-text">등록된 일정이 없습니다</div><div class="empty-hint">＋ 일정 추가 버튼으로 등록해보세요</div></div>`;
    } else {
      ul.innerHTML=userEvents.map(e=>`
        <div class="user-event-item">
          ${getBadge(e.type)}
          <div class="info-body">
            <div class="info-title">${e.title}</div>
            <div class="info-meta"><span>${e.date}</span>${e.memo?`<span>${e.memo}</span>`:''}</div>
          </div>
        </div>
      `).join('');
    }
  }
}

function prevMonth(){ cm--; if(cm<0){cm=11;cy--;} renderCal(); }
function nextMonth(){ cm++; if(cm>11){cm=0;cy++;} renderCal(); }

function showPage(name, el) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(el) el.classList.add('active');
  const titles={dashboard:'대시보드',info:'학술정보',calendar:'캘린더'};
  document.getElementById('page-title').textContent=titles[name];
  if(name==='calendar') renderCal();
}

function switchTab(tab, type) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  renderList('list-all', type);
}

function openModal(){
  document.getElementById('modal').classList.add('open');
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
}

function closeModal(){ document.getElementById('modal').classList.remove('open'); }

function saveEvent(){
  const title=document.getElementById('f-title').value.trim();
  const type=document.getElementById('f-type').value;
  const date=document.getElementById('f-date').value;
  const memo=document.getElementById('f-memo').value.trim();
  if(!title||!date){alert('제목과 날짜를 입력해주세요.');return;}
  userEvents.push({title,type,date,memo});
  closeModal();
  ['f-title','f-memo'].forEach(id=>document.getElementById(id).value='');
  renderCal();
  showPage('calendar', document.querySelectorAll('.nav-item')[2]);
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

// today label
const now = new Date();
document.getElementById('today-date').textContent =
  `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${['일','월','화','수','목','금','토'][now.getDay()]}요일`;

// init
renderList('list-dash');
renderList('list-all');
renderCal();
</script>
</body>
</html>
